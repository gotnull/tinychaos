; tinychaos ESP32-S3 firmware
;
; Targets the Waveshare ESP32-S3 R8 OPI dev board (same hardware family as
; rsvpnano). Streams framed binary packets from ADC1_CH0 to the host over
; USB CDC, with WiFi + ArduinoOTA + ElegantOTA so you can push firmware
; updates without unplugging the cable once the device is on your network.
;
; Build:   pio run -e waveshare_esp32s3
; Upload:  pio run -e waveshare_esp32s3 -t upload                        (USB, first time)
;          pio run -e waveshare_esp32s3 -t upload --upload-port <ip>     (ArduinoOTA over WiFi)
;          ElegantOTA web form at http://<device-ip>/update              (browser upload)
; Monitor: pio device monitor -e waveshare_esp32s3

[platformio]
default_envs = waveshare_esp32s3

[env]
; The pioarduino fork of platform-espressif32 ships Arduino-ESP32 v3.x which
; has the modern analogContinuous() API we use for DMA-backed ADC sampling.
; Upstream platform-espressif32@6.x is still on Arduino-ESP32 v2.x where that
; API does not exist.
platform = https://github.com/pioarduino/platform-espressif32
board = esp32-s3-r8-opi
framework = arduino
monitor_speed = 921600
upload_speed = 460800
extra_scripts = pre:tools/inject_build_tag.py
; Serial: we keep the framework's default ESP-IDF console on UART0 (CH343)
; and write packets through stdout (fwrite). The ONE thing that corrupts the
; binary stream is the console VFS's default LF->CRLF translation: every
; 0x0A byte in a packet gets a 0x0D prepended, inflating the frame by a byte
; and breaking CRC. The runtime API to disable it doesn't reach the console's
; VFS layer on this board, so we disable it at the source with the compile-
; time newlib setting below. (WiFi's ROM ets_printf is the other UART0 noise
; source, so WiFi stays OFF until the user picks "Check for update".)
;
; custom_sdkconfig forces a from-source ESP-IDF rebuild on the S3 (slow the
; first time, then cached; all artifacts are gitignored). The Arduino core's
; chip-debug-report.cpp then needs a __wrap_log_printf definition that the
; hybrid build leaves undefined — main.cpp provides a no-op stub for it.
custom_sdkconfig =
  CONFIG_NEWLIB_STDOUT_LINE_ENDING_LF=y
  CONFIG_NEWLIB_STDIN_LINE_ENDING_LF=y
lib_deps =
  ESP32Async/AsyncTCP @ ^3.2.10
  ESP32Async/ESPAsyncWebServer @ ^3.5.0
  ayushsharma82/ElegantOTA @ ^3.1.5
build_flags =
  ; CORE_DEBUG_LEVEL=0 silences framework ESP_LOGI/E from WiFi/Wire/etc.
  ; Without this, log bytes interleave with binary packet writes on UART0
  ; and corrupt CRCs on the host side (we share the same console driver
  ; with the framework). Our own printf() boot messages still come through.
  -DCORE_DEBUG_LEVEL=0
  -DBOARD_HAS_PSRAM
  ; HW CDC + JTAG on the native USB controller. We do NOT override
  ; ARDUINO_USB_CDC_ON_BOOT here: the Arduino-ESP32 framework libraries
  ; are pre-compiled with =1 (set by the board JSON's extra_flags), so
  ; flipping it in our project-level build_flags only affects our own
  ; src/ files at compile time. The linker still resolves `Serial` to the
  ; framework's USBCDC instance. To stream framed packets through the
  ; CH343 USB-UART chip (single-cable workflow), main.cpp uses Serial0
  ; explicitly instead of relying on the alias.
  -DARDUINO_USB_MODE=1
  ; ElegantOTA needs to be told we are using the async web server fork.
  -DELEGANTOTA_USE_ASYNC_WEBSERVER=1

[env:waveshare_esp32s3]
; Default upload over USB the first time, then switch to OTA via
; `pio run -t upload --upload-port <ip>` once the device is on your network.
upload_protocol = esptool
