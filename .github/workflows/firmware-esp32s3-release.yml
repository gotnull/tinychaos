name: Build & release firmware-esp32s3

# Builds the ESP32-S3 firmware and publishes a GitHub release containing
# `tinychaos-esp32s3.bin`. The device-side OtaUpdater fetches the latest
# release from this repo via api.github.com, downloads that asset, and
# self-flashes. No PlatformIO or esptool required on the user's machine
# after the first successful flash.
#
# Triggers:
#   - Push to main that touches firmware-esp32s3/ → rolling pre-release
#     tagged `firmware-esp32s3-YYMMDD-HHMMSS-<sha7>`. Tag name doubles as
#     the firmware's TINYCHAOS_BUILD_TAG so the device knows when it has
#     drifted from the latest.
#   - Manual workflow_dispatch → same.

on:
  push:
    branches: [main]
    paths:
      - 'firmware-esp32s3/**'
      - '.github/workflows/firmware-esp32s3-release.yml'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: firmware-esp32s3-release
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware-esp32s3

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Cache PlatformIO platform packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/platforms
            ~/.platformio/packages
          # Bump the suffix when you intentionally want a clean toolchain
          # download (e.g. after a pioarduino platform pin change).
          key: pio-${{ runner.os }}-v1-${{ hashFiles('firmware-esp32s3/platformio.ini') }}

      # Compute a stable tag for both the firmware build-stamp and the
      # release. On a tag push GitHub already gave us GITHUB_REF_NAME; on a
      # branch push we synthesise one.
      - name: Compute release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            echo "tag=$GITHUB_REF_NAME" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            ts=$(date -u '+%y%m%d-%H%M%S')
            short=${GITHUB_SHA::7}
            echo "tag=firmware-esp32s3-${ts}-${short}" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Provide placeholder wifi_config.h for CI build
        # The real file is gitignored. Without it the build fails on the
        # `#include "wifi_config.h"`. The CI binary leaves WIFI_SSID empty
        # so it boots in USB-CDC-only mode; the user's local build supplies
        # the real credentials.
        run: |
          if [[ ! -f src/wifi_config.h ]]; then
            cp src/wifi_config.h.template src/wifi_config.h
          fi

      - name: Build firmware
        env:
          TINYCHAOS_BUILD_TAG: ${{ steps.tag.outputs.tag }}
        run: pio run -e waveshare_esp32s3

      - name: Stage release assets
        run: |
          mkdir -p ../dist
          cp .pio/build/waveshare_esp32s3/firmware.bin ../dist/tinychaos-esp32s3.bin
          cp .pio/build/waveshare_esp32s3/firmware.factory.bin ../dist/tinychaos-esp32s3.factory.bin
          (cd ../dist && shasum -a 256 tinychaos-esp32s3.bin tinychaos-esp32s3.factory.bin > SHA256SUMS.txt)
          ls -lh ../dist

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          prerelease: ${{ steps.tag.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/tinychaos-esp32s3.bin
            dist/tinychaos-esp32s3.factory.bin
            dist/SHA256SUMS.txt
